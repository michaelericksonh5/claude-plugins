name: Sync plugin versions

# Keeps .claude-plugin/marketplace.json's `version` fields in lockstep with
# each plugin's upstream plugin.json. Runs on:
#   - repository_dispatch (plugin-released) - fired by each plugin repo's
#     notify-marketplace.yml workflow on tag push; near-instant sync
#   - workflow_dispatch                     - manual trigger from Actions tab
#   - push to main                          - catches marketplace.json edits
#   - schedule */30                         - safety net for missed dispatches
#
# Commits and pushes back to the same branch using the built-in GITHUB_TOKEN.
# Commits made by this workflow do NOT re-trigger the workflow, so no loop.

on:
  repository_dispatch:
    types: [plugin-released]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**/.claude-plugin/plugin.json'
      - '.github/scripts/sync-plugin-versions.mjs'
      - '.github/workflows/sync-plugin-versions.yml'

concurrency:
  group: sync-plugin-versions
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync versions
        run: node .github/scripts/sync-plugin-versions.mjs

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain .claude-plugin/marketplace.json)" ]]; then
            echo "No marketplace.json changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: auto-sync plugin versions from upstream plugin.json"
          git push
